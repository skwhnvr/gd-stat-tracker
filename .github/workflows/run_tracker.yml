name: Daily GD Rank Tracker

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every night at 12:00 AM UTC
      timezone: 'Europe/London'
  workflow_dispatch: # Allows you to force-trigger it manually whenever you want

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests plotly pandas

    - name: Run Script
      run: python gd_tracker.py

    - name: Save Data and Graph to Repo
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        [ -f gd_rank_history.csv ] && git add gd_rank_history.csv
        [ -f index.html ] && git add index.html
        git commit -m "Automated daily stats & interactive chart update" || echo "No changes"
        git push || echo "No changes"
